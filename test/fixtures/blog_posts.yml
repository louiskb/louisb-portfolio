# Tags are now expressed through the tags / blog_post_tags join tables
# (see tags.yml + blog_post_tags.yml) — the legacy `tags` string column was
# dropped in the Phase 2.3 backfill migration.
welcome:
  title: Welcome to my blog
  description: A short introduction to what I write about here.
  img_url: lb-portfolio.jpeg
  html_content: "<p>Hello world, this is my first post about building with Rails.</p>"
  user: louis
  created_at: <%= 1.month.ago %>
  updated_at: <%= 1.month.ago %>

deploying:
  title: Deploying Rails to Heroku
  description: Lessons learned shipping a Rails app to production.
  img_url: heroku.svg
  html_content: "<p>Here is how I deploy a Rails app to Heroku step by step.</p>"
  user: louis
  created_at: <%= 2.weeks.ago %>
  updated_at: <%= 2.weeks.ago %>

# Owned by the intruder account — used only by cross-user ownership tests.
# Kept a draft so it never affects published-count or visitor-index assertions.
intruder_post:
  title: Intruder's Own Post
  description: A post owned by the second account.
  img_url: lb-portfolio.jpeg
  html_content: "<p>Intruder's own content.</p>"
  status: 0
  user: intruder
  created_at: <%= 1.week.ago %>
  updated_at: <%= 1.week.ago %>
